<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoostDK - Optimization Toolkit</title>
    <style>
        /* Estilos minimalistas y oscuros tipo desarrollador */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid #333;
            border-radius: 12px;
            background-color: #1e1e1e;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            max-width: 500px;
        }
        h1 {
            color: #4caf50; /* Color verde éxito */
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            font-size: 1.2em;
            color: #aaaaaa;
            margin-bottom: 30px;
        }
        .status-box {
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #4caf50;
            display: inline-block;
        }
        .status-title {
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }
        .status-text {
            color: #81c784;
        }
        footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BoostDK</h1>
        <p class="subtitle">Herramientas de Optimización para Desarrollo de Software</p>
        
        <div class="status-box">
            <p class="status-title">Estado del Dominio:</p>
            <p class="status-text">⏳ Esperando aprobación de is-a.dev</p>
        </div>

        <footer>
            Este sitio es una vista previa para la revisión del Pull Request.
        </footer>
    </div>
</body>
</html>
